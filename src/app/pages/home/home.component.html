<header class="header">
  <div class="header-left">
    <button class="menu-btn" (click)="toggleMenu()">☰</button>
    <h1 class="logo">Arte Baiana</h1>
  </div>
  <div class="header-right">
    <a href="#" class="login-btn">Login</a>
  </div>
</header>

<nav class="sidebar" [class.open]="menuOpen">
  <ul>
    <li><a routerLink="/" routerLinkActive="active">Home</a></li>
    <li><a routerLink="/sobre" routerLinkActive="active">Sobre nós</a></li>
    <li><a routerLink="/fale" routerLinkActive="active">Fale conosco</a></li>
<li><a routerLink="/dashboard" routerLinkActive="active">Área credenciada</a></li>

  </ul>
</nav>

<main class="layout">
  <div class="carousel">
    <button class="prev" (click)="prevSlide()">‹</button>
    <div class="slides">
      <img *ngFor="let slide of slides; let i = index"
           [src]="'/img/' + slide"
           [class.active]="i === currentIndex"
           alt="Slide {{i + 1}}">
    </div>
    <button class="next" (click)="nextSlide()">›</button>
  </div>
</main>

<div class="login-area">
  <div class="login-bar">
    <div class="login-field">
      <label for="username">Login</label>
      <input id="username" type="text" placeholder="Digite seu login" class="login-input" [(ngModel)]="email">
    </div>
    <div class="login-field">
      <label for="password">Senha</label>
      <input id="password" type="password" placeholder="Digite sua senha" class="login-input" [(ngModel)]="senha">
    </div>
  </div>

  <button (click)="entrar()" class="login-btn-bar">Entrar</button>
</div>


<footer class="footer">
  <div class="footer-left">
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank" aria-label="Facebook">
        <img src="assets/img/facebook.png" >
      </a>
      <a href="https://instagram.com" target="_blank" aria-label="Instagram">
        <img src="assets/img/instagram.png" >
      </a>
      <a href="https://twitter.com" target="_blank" aria-label="Twitter">
        <img src="assets/img/twitter.png" >
      </a>
    </div>
  </div>

  <div class="footer-center">
    <p>© Copyright 2025. Portal do Artesanato da Bahia. Direitos reservados.</p>
  </div>

  <div class="footer-right">
    <div class="footer-links">
      <a href="#">Termos de uso</a> | 
      <a href="#">Política de Privacidade</a>
    </div>
  </div>
</footer>
