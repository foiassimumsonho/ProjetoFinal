<div class="cadastro-container">
  <div class="cadastro-box">
    <h2>Cadastro</h2>

    <form (ngSubmit)="cadastrar()" #cadastroForm="ngForm">

      <div class="form-grid">

        <div class="form-item">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" [(ngModel)]="usuario.nome" required />
        </div>


        <div class="form-item">
        <label for="senha">Senha</label>
        <input  id="senha"   name="senha" type="password"  [(ngModel)]="usuario.senha"   required />
        </div>

        <div class="form-item">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" [(ngModel)]="usuario.email" required />
        </div>

        <div class="form-item">
          <label for="telefone">Telefone</label>
          <input id="telefone" name="telefone" type="tel" [(ngModel)]="usuario.telefone" required />
        </div>

        <div class="form-item">
          <label for="estado">Estado</label>
          <input id="estado" name="estado" [(ngModel)]="usuario.estado" required />
        </div>

        <div class="form-item">
          <label for="municipio">Município</label>
          <input id="municipio" name="municipio" [(ngModel)]="usuario.municipio" required />
        </div>

      </div>

      <div class="lgpd-box">
        <label>
          <input type="checkbox" [(ngModel)]="aceitaLgpd" name="lgpd" required />
Declaro que li e aceito a Política de Privacidade e autorizo o uso dos meus dados conforme a LGPD.</label>

        <a href="https://www.gov.br/governodigital/pt-br/privacidade-e-seguranca/ppsi/modelo_ppdp.pdf" class="lgpd-link"> Ler Política de Privacidade </a>
      </div>

      <button type="submit" [disabled]="!cadastroForm.form.valid || !aceitaLgpd">
        Cadastrar
      </button>

    </form>

  </div>
</div>
